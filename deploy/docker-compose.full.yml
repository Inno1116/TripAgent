name: kyuriagents

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-kyuriagents}
      POSTGRES_USER: ${POSTGRES_USER:-kyuriagents}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kyuriagents} -d ${POSTGRES_DB:-kyuriagents}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  searxng:
    image: searxng/searxng:latest
    restart: unless-stopped
    volumes:
      - ./searxng/settings.yml:/etc/searxng/settings.yml:ro
    ports:
      - "${SEARXNG_PORT:-8888}:8080"

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.2
    restart: unless-stopped
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: -Xms512m -Xmx512m
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    ports:
      - "${ES_PORT:-9200}:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200/_cluster/health?wait_for_status=yellow\\&timeout=5s >/dev/null"]
      interval: 15s
      timeout: 10s
      retries: 20

  etcd:
    image: quay.io/coreos/etcd:v3.5.5
    restart: unless-stopped
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
      ETCD_SNAPSHOT_COUNT: "50000"
    command: >
      etcd
      --advertise-client-urls=http://127.0.0.1:2379
      --listen-client-urls=http://0.0.0.0:2379
      --data-dir=/etcd
    volumes:
      - etcd_data:/etcd

  minio:
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    command: minio server /minio_data --console-address ":9001"
    volumes:
      - minio_data:/minio_data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 10s
      retries: 20

  milvus:
    image: milvusdb/milvus:v2.4.0
    restart: unless-stopped
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
      MINIO_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - milvus_data:/var/lib/milvus
    ports:
      - "${MILVUS_PORT:-19530}:19530"
      - "${MILVUS_METRICS_PORT:-9091}:9091"
    depends_on:
      etcd:
        condition: service_started
      minio:
        condition: service_healthy

  bootstrap:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.api
    env_file:
      - ${KYURIAGENTS_ENV_FILE:-runtime.env}
    command: ["python", "scripts/bootstrap_runtime.py"]
    depends_on:
      postgres:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      milvus:
        condition: service_started
    restart: "no"

  api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.api
    restart: unless-stopped
    env_file:
      - ${KYURIAGENTS_ENV_FILE:-runtime.env}
    volumes:
      - uploads_data:/data/uploads
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      bootstrap:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      searxng:
        condition: service_started

  worker:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.api
    restart: unless-stopped
    env_file:
      - ${KYURIAGENTS_ENV_FILE:-runtime.env}
    command: ["python", "scripts/ingestion_worker.py"]
    volumes:
      - uploads_data:/data/uploads
    depends_on:
      bootstrap:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  web:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.web
      args:
        NEXT_PUBLIC_KYURIAGENTS_API_BASE: ${KYURIAGENTS_API_BASE:-/api}
        KYURIAGENTS_INTERNAL_API_BASE: ${KYURIAGENTS_INTERNAL_API_BASE:-http://api:8000}
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-8080}:3000"
    depends_on:
      api:
        condition: service_started

volumes:
  postgres_data:
  elasticsearch_data:
  etcd_data:
  minio_data:
  milvus_data:
  uploads_data:
